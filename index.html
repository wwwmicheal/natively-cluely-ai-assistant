<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-site-verification" content="j8eq-Lj1onJN7wj-wOgZ1EPlIiEzvDfY_X_fkmdkUyw" />
  <title>Natively</title>
  <script>
    try {
      var w = new URLSearchParams(location.search).get('window') || 'launcher';
      document.documentElement.setAttribute('data-window', w);
    } catch(e) {
      document.documentElement.setAttribute('data-window', 'launcher');
    }
  </script>
  <style>
    html, body, #root { background: #000; }
    html[data-window="overlay"] body,
    html[data-window="overlay"] #root,
    html[data-window="cropper"] body,
    html[data-window="cropper"] #root {
      background: transparent !important;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; img-src 'self' data: https:; connect-src 'self' https://generativelanguage.googleapis.com https://api.groq.com https://*.google-analytics.com https://analytics.google.com https://www.googletagmanager.com https://campaign-sand.vercel.app; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;">
</head>

<body style="background-color: #000000; margin: 0; overflow: hidden;">
  <!-- Synchronously apply cached theme before any render — prevents flash/mixed theme -->
  <script>
    try {
      var t = localStorage.getItem('natively_resolved_theme');
      if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
    } catch(e) {}
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
