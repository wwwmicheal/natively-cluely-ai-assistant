name: Feature Request
description: Suggest an idea for this project
title: "[Feature Request]: "
labels: ["enhancement"]
assignees:
  - ''
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature to improve the project!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the feature is and what problem it solves.
      placeholder: e.g. I'm always frustrated when [...] so I would like to have [...]
    validations:
      required: true
  - type: textarea
    id: alternative
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
