name: Build Smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  electron-entry-smoke:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Build Electron main process
        run: npm run build:electron

      - name: Verify packaged entrypoint exists
        run: test -f dist-electron/electron/main.js

  api-smoke:
    # Runs weekly (Monday 09:00 UTC) and on demand via workflow_dispatch.
    # Requires secrets: NATIVELY_API_KEY (or NATIVELY_TRIAL_TOKEN) set in repo.
    # Without credentials the suite is skipped cleanly via the env gate.
    name: API Smoke (weekly)
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    schedule:
      - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Electron (test prerequisite)
        run: npm run build:electron

      - name: Run API smoke tests
        run: npm test -- --test-name-pattern 'Natively API'
        env:
          RUN_NATIVELY_API_E2E: ${{ secrets.RUN_NATIVELY_API_E2E }}
          NATIVELY_API_KEY: ${{ secrets.NATIVELY_API_KEY }}
          NATIVELY_TRIAL_TOKEN: ${{ secrets.NATIVELY_TRIAL_TOKEN }}
          NATIVELY_API_BASE: ${{ secrets.NATIVELY_API_BASE }}
